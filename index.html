<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StrideQuest Legal</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --link: #22d3ee;
      --accent: #38bdf8;
      --border: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(880px, 100%);
      background: linear-gradient(180deg, #0b1220, var(--panel));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #f8fafc;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }
    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }
    a {
      display: block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      transition: transform 0.15s ease, border-color 0.15s ease;
      background: rgba(15, 23, 42, 0.6);
    }
    a:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      color: #ffffff;
    }
    .hint {
      margin-top: 14px;
      font-size: 0.9rem;
    }
    .hint a {
      display: inline;
      border: 0;
      padding: 0;
      color: var(--link);
      background: transparent;
    }
  </style>
</head>
<body>
  <main>
    <h1>StrideQuest Legal</h1>
    <p>Documentos legales oficiales para usuarios de StrideQuest.</p>
    <ul>
      <li><a href="./privacy-policy.html">Politica de Privacidad / Privacy Policy</a></li>
      <li><a href="./terms-of-service.html">Terminos de Servicio / Terms of Service</a></li>
      <li><a href="./delete-account.html">Eliminacion de Cuenta / Account Deletion</a></li>
    </ul>
    <p class="hint">Sitio publicado via GitHub Pages.</p>
  </main>
</body>
</html>
